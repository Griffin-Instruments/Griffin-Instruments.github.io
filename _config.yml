name: Griffin Instruments
tagline: Open-Source Hardware for Behavioral Neuroscience
description: >
  Griffin Instruments develops open-source operant chamber hardware and
  software for behavioral neuroscience research.

footer-links:
  github: griffin-instruments
  email:
  rss: true

disqus:
google_analytics:

url: "https://griffin-instruments.github.io/"
baseurl: ""

permalink: /:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'

sass:
  style: :expanded

plugins:
  - jekyll-sitemap
  - jekyll-feed

exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - CNAME
  - CLAUDE.md
